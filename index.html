function parseExcelStatement(workbook, fileName) {
  const ws = workbook.Sheets[workbook.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
  
  const monthMatch = fileName.match(/(\d{6})/);
  if (!monthMatch) throw new Error('Cannot extract month');
  
  const monthStr = monthMatch[1];
  const yr = parseInt(monthStr.substring(0, 4));
  const mo = parseInt(monthStr.substring(4, 6));
  
  if (!yr || !mo || mo < 1 || mo > 12) throw new Error('Invalid date');
  
  let grossRevenue = null;
  let netProceeds = null;
  
  for (const row of rows) {
    const firstCol = Object.values(row)[1];
    if (firstCol && typeof firstCol === 'string') {
      if (firstCol.includes('Total  Revenue')) {
        const values = Object.values(row);
        grossRevenue = parseFloat(values[4]) || null;
      }
      if (firstCol.includes('Worldwide Net Proceeds')) {
        const values = Object.values(row);
        netProceeds = parseFloat(values[4]) || null;
      }
    }
  }
  
  if (!grossRevenue || !netProceeds) throw new Error(`No revenue data in ${fileName}`);
  
  const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const period = MO[mo - 1] + ' ' + yr;
  
  return { id: Date.now() + Math.random(), period, year: yr, month: mo, gross: Math.round(grossRevenue * 100) / 100, net: Math.round(netProceeds * 100) / 100, source: fileName };
}

      [3.5, 5, 6, 10].map(m => React.createElement('button', { key: m, onClick: () => setMultiple(m), style: { padding: 12, borderRadius: 8, background: multiple === m ? '#d4af37' : '#1a1f30', border: multiple === m ? 'none' : '1px solid rgba(255,255,255,0.1)', color: multiple === m ? '#0c0f18' : '#cdd1db', fontWeight: 600, fontSize: 14 } }, m + 'x'))
    ),
    React.createElement('div', { className: 'card', style: { background: 'rgba(212,175,55,0.08)', borderColor: 'rgba(212,175,55,0.3)' } },
      React.createElement('div', { style: { fontSize: 11, color: '#6b7280', marginBottom: 12 } }, 'METHODOLOGY'),
      React.createElement('div', { style: { fontSize: 12, color: '#9ca3af', lineHeight: 1.8 } }, `Record label valuation using EBITDA/NLS method. Based on ${statements.length} months (${Math.min(...years)}–${Math.max(...years)}). Annual NET: ${fmt(avgAnnualNet)}. Market standard multiple for independent labels: 6x.`)
    )
  );
}

  const catalog = EMBEDDED_DATA.catalog || [];

  const tabs = [{id:'dashboard',label:'⊞ Dashboard'},{id:'agreements',label:'📄 Agreements'},{id:'catalog',label:'🎵 Catalog'},{id:'statements',label:'💶 Statements'},{id:'splits',label:'👥 Splits & Advances'},{id:'valuation',label:'📈 Valuation'}];
  const Tab = {dashboard:Dashboard,agreements:Agreements,catalog:Catalog,statements:Statements,splits:SplitsAdvances,valuation:Valuation}[tab];

  return React.createElement('div', { style: { display: 'flex', flexDirection: 'column', height: '100vh', background: '#0c0f18', color: '#dde1ea', overflow: 'hidden' } },
    React.createElement('div', { style: { background: '#0f1220', borderBottom: '1px solid rgba(255,255,255,0.07)', padding: '0 20px', height: 60, display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 } },
      React.createElement('div', { style: { fontSize: 20, fontWeight: 700, color: '#d4af37' } }, '♩'),
      React.createElement('div', null,
        React.createElement('div', { style: { fontSize: 15, fontWeight: 700 } }, 'Barong Family'),
        React.createElement('div', { style: { fontSize: 10, color: '#4b5563', letterSpacing: '0.1em', textTransform: 'uppercase' } }, 'Catalog Diligence Portal')

    React.createElement('div', { style: { display: 'flex', flex: 1, overflow: 'hidden' } },
      React.createElement('div', { style: { width: 170, background: '#0f1220', borderRight: '1px solid rgba(255,255,255,0.07)', padding: '8px 0', display: 'flex', flexDirection: 'column', gap: 1, overflowY: 'auto', flexShrink: 0 } },
        tabs.map(t => React.createElement('button', { key: t.id, onClick: () => setTab(t.id), style: { width: '100%', padding: '11px 14px', background: tab === t.id ? 'rgba(212,175,55,0.1)' : 'transparent', color: tab === t.id ? '#d4af37' : '#8b95a8', border: 'none', cursor: 'pointer', fontSize: 13, textAlign: 'left', borderLeft: `3px solid ${tab === t.id ? '#d4af37' : 'transparent'}` } }, t.label))
      ),
      React.createElement('div', { style: { flex: 1, overflowY: 'auto', background: '#0c0f18' } },

  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App, null));
